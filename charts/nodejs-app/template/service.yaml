apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nodejs-app-svc
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}-nodejs-app
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    app: {{ .Release.Name }}-nodejs-app
